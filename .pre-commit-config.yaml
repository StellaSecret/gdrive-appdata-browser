repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Secret detection - scans the diff for anything that looks like an API
  # key, token, or credential before it ever reaches a commit.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock.json

  # Rust lint & format - mirrors exactly what CI's unit-tests job runs, so
  # issues are caught locally before a push instead of in the pipeline.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Formats Rust code (cargo fmt -- --check)
        entry: cargo fmt --
        args: ["--check"]
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Lints Rust code (cargo clippy --all-targets -- -D warnings)
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
