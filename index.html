<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>appDataFolder Browser</title>

  <!-- Google Identity Services: provides the browser-native OAuth popup flow.
       No client_secret is ever needed with this library. -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // Thin JS bridge called from Rust/WASM via wasm-bindgen.
    // Wraps Google Identity Services' token client in a Promise so the
    // Rust side can just `.await` it.
    function gisRequestTokenPromise(clientId, scope) {
      return new Promise((resolve, reject) => {
        if (!window.google || !google.accounts || !google.accounts.oauth2) {
          reject("Google Identity Services hasn't loaded yet. Please try again in a moment.");
          return;
        }
        try {
          const client = google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: scope,
            callback: (resp) => {
              if (resp.error) {
                reject(resp.error_description || resp.error);
              } else {
                resolve(resp.access_token);
              }
            },
            error_callback: (err) => {
              reject(err.message || "Sign-in was cancelled or failed.");
            },
          });
          client.requestAccessToken({ prompt: "" });
        } catch (e) {
          reject(String(e));
        }
      });
    }
  </script>
</head>
<body>
  <div id="main"></div>
</body>
</html>
